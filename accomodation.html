<!DOCTYPE html>
<html>
<head>
<title>Accommodation Booking</title>
<style>
body{font-family:Arial;background:#f4f4f4;}
.container{
width:400px;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
}
input,select{
width:100%;
padding:10px;
margin:8px 0;
}
button{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
}
</style>
</head>
<body>

<div class="container">
<h2>Room Booking</h2>

<form>
<input type="text" placeholder="Name">
<input type="number" placeholder="Number of Guests">
<input type="date">

<select>
<option>Room Type</option>
<option>AC Room</option>
<option>Non AC Room</option>
<option>Deluxe Room</option>
</select>

<button>Reserve Room</button>
</form>
</div>

</body>
</html>
