<!DOCTYPE html>
<html>
<head>
<title>Darshan Booking</title>
<style>
body{font-family:Arial;background:#f4f4f4;}
.container{
width:400px;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
}
input,select{
width:100%;
padding:10px;
margin:8px 0;
}
button{
width:100%;
padding:10px;
background:#8B0000;
color:white;
border:none;
}
</style>
</head>
<body>

<div class="container">
<h2>Darshan Booking</h2>

<form>
<input type="text" placeholder="Full Name">
<input type="email" placeholder="Email">
<input type="tel" placeholder="Mobile Number">

<select>
<option>Select Darshan Type</option>
<option>Special Entry Darshan</option>
<option>Sarva Darshan</option>
<option>Divya Darshan</option>
</select>

<input type="date">
<input type="number" placeholder="Number of Persons">

<button>Book Now</button>
</form>
</div>
</body>
</html>
