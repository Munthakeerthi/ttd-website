<!DOCTYPE html>
<html>
<head>
<title>Donation</title>
<style>
body{
font-family:Arial;
background:#fff8dc;
}
.container{
width:400px;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
}
input{
width:100%;
padding:10px;
margin:8px 0;
}
button{
width:100%;
padding:10px;
background:orange;
border:none;
}
</style>
</head>
<body>

<div class="container">
<h2>Temple Donation</h2>

<form>
<input type="text" placeholder="Donor Name">
<input type="email" placeholder="Email">
<input type="number" placeholder="Donation Amount">

<button>Donate Now</button>
</form>

</div>

</body>
</html>
