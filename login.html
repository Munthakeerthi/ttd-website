<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
font-family:Arial;
background:#f4f4f4;
}

.container{
width:350px;
margin:100px auto;
background:white;
padding:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#8B0000;
color:white;
border:none;
}
</style>
</head>
<body>

<div class="container">

<h2>User Login</h2>

<form>
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">

<button>Login</button>
</form>

</div>

</body>
</html>
