<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body{
font-family:Arial;
background:#f4f4f4;
}

.container{
width:400px;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
}

button{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
}
</style>
</head>
<body>

<div class="container">

<h2>Create Account</h2>

<form>

<input type="text" placeholder="Full Name">
<input type="email" placeholder="Email">
<input type="tel" placeholder="Mobile Number">
<input type="password" placeholder="Password">
<input type="password" placeholder="Confirm Password">

<button>Register</button>

</form>

</div>

</body>
</html>
